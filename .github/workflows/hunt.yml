name: Hunt ARM

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  create-arm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: composer install --no-dev --no-interaction

      - name: Write private key
        run: printf '%s' "${{ secrets.OCI_PRIVATE_KEY }}" > oci_private_key.pem

      - name: Create env
        run: |
          cat > .env <<EOF
          OCI_REGION=${{ secrets.OCI_REGION }}
          OCI_USER_ID=${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT=${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME=${{ github.workspace }}/oci_private_key.pem
          OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID=${{ secrets.OCI_IMAGE_ID }}
          OCI_SSH_PUBLIC_KEY="${{ secrets.OCI_SSH_PUBLIC_KEY }}"
          OCI_SHAPE=VM.Standard.A1.Flex
          OCI_OCPUS=4
          OCI_MEMORY_IN_GBS=24
          OCI_MAX_INSTANCES=1
          CACHE_AVAILABILITY_DOMAINS=1
          EOF

      - name: Run hunt
        run: php ./index.php
